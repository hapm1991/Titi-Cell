<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d18">
<title>Titi Cell — Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d18;--surface:#13131f;--surface2:#1c1c2e;--surface3:#232338;
  --border:#2e2e4a;--accent:#7c6fff;--accent-glow:rgba(124,111,255,0.35);
  --green:#3ddc84;--pink:#ff5f87;--gold:#ffb830;
  --text:#eeeeff;--text2:#9090bb;--text3:#5a5a80;
  --r:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(13,13,24,0.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  padding:10px 20px;display:flex;align-items:center;justify-content:space-between;
}
.hlogo{display:flex;align-items:center;gap:10px}
.hlogo img{height:38px;width:auto;filter:drop-shadow(0 0 10px var(--accent-glow))}
.hlogo-name{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:-.3px}
.hlogo-name span{color:var(--accent)}
.hbadge{
  background:rgba(124,111,255,0.12);border:1px solid rgba(124,111,255,0.25);
  color:var(--accent);padding:5px 12px;border-radius:20px;
  font-size:11px;font-weight:600;letter-spacing:.5px;
}

/* ── HERO ── */
.hero{
  position:relative;overflow:hidden;
  padding:52px 20px 44px;text-align:center;
  background:linear-gradient(160deg,rgba(124,111,255,0.12) 0%,rgba(61,220,132,0.05) 60%,transparent 100%);
}
.hero::before{
  content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);
  width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(124,111,255,0.15) 0%,transparent 70%);
  pointer-events:none;
}
.hero-eyebrow{
  display:inline-block;background:rgba(124,111,255,0.12);border:1px solid rgba(124,111,255,0.25);
  color:var(--accent);padding:5px 16px;border-radius:20px;
  font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;
}
.hero h1{
  font-family:'Syne',sans-serif;font-size:clamp(26px,6vw,40px);font-weight:800;
  line-height:1.1;letter-spacing:-1px;margin-bottom:12px;
}
.hero h1 span{
  background:linear-gradient(135deg,var(--accent),var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-sub{font-size:14px;color:var(--text2);max-width:320px;margin:0 auto 24px;line-height:1.6}
.hero-stats{
  display:flex;justify-content:center;gap:24px;
}
.hstat{text-align:center}
.hstat-num{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--accent)}
.hstat-label{font-size:11px;color:var(--text2);margin-top:2px}

/* ── FILTERS ── */
.filters-wrap{
  padding:16px 20px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:12px;
}
.search-wrap{
  display:flex;align-items:center;gap:10px;
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:14px;padding:11px 16px;
  transition:border-color .2s;
}
.search-wrap:focus-within{border-color:var(--accent)}
.search-wrap svg{flex-shrink:0;opacity:.5}
.search-wrap input{
  flex:1;background:none;border:none;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:15px;outline:none;
}
.search-wrap input::placeholder{color:var(--text3)}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{
  padding:7px 16px;border-radius:24px;font-size:12px;font-weight:600;letter-spacing:.2px;
  border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);
  cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;
}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 16px var(--accent-glow)}
.selects-row{display:flex;gap:8px}
.sel{
  flex:1;padding:10px 12px;background:var(--surface2);border:1.5px solid var(--border);
  border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;
  outline:none;-webkit-appearance:none;cursor:pointer;transition:border-color .2s;
}
.sel:focus{border-color:var(--accent)}

/* ── GRID ── */
#grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;padding:20px;
}
@media(min-width:560px){#grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:860px){#grid{grid-template-columns:repeat(4,1fr)}}

/* ── PRODUCT CARD ── */
.pcard{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--r);overflow:hidden;cursor:pointer;
  display:flex;flex-direction:column;
  transition:transform .18s,border-color .18s,box-shadow .18s;
  position:relative;
}
.pcard:hover{transform:translateY(-3px);border-color:rgba(124,111,255,.4);box-shadow:0 12px 32px rgba(0,0,0,.4)}
.pcard:active{transform:scale(.97)}
.pcard-img{
  width:100%;aspect-ratio:1;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-size:52px;overflow:hidden;position:relative;
}
.pcard-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.pcard:hover .pcard-img img{transform:scale(1.04)}
.pcard-img .no-img{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  color:var(--text3);font-size:13px;
}
.pcard-img .no-img span{font-size:40px}
.pcard-body{padding:12px 12px 8px;flex:1;display:flex;flex-direction:column}
.pcard-brand{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.pcard-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;line-height:1.2;margin-bottom:5px}
.pcard-specs{font-size:11px;color:var(--text2);margin-bottom:10px;flex:1;line-height:1.4}
.pcard-price{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--green);margin-bottom:2px}
.pcard-alt{font-size:10px;color:var(--text3)}
.pcard-wa{
  display:flex;align-items:center;justify-content:center;gap:7px;
  background:linear-gradient(135deg,#25D366,#1da851);
  color:#fff;border:none;border-radius:0 0 calc(var(--r) - 2px) calc(var(--r) - 2px);
  padding:11px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;width:100%;transition:opacity .15s;margin-top:10px;letter-spacing:.2px;
}
.pcard-wa:active{opacity:.85}

/* ── EMPTY / LOADING ── */
.empty-state{text-align:center;padding:70px 20px;color:var(--text2)}
.empty-state .icon{font-size:54px;margin-bottom:14px}
.empty-state p{font-size:14px;line-height:1.6}
.loader{display:flex;flex-direction:column;align-items:center;padding:70px 20px;gap:14px;color:var(--text2)}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  z-index:200;display:none;align-items:flex-end;
}
.overlay.open{display:flex}
.modal{
  background:var(--surface);border-radius:28px 28px 0 0;
  border-top:1.5px solid var(--border);
  padding:20px 20px calc(env(safe-area-inset-bottom,0px) + 24px);
  width:100%;max-height:92vh;overflow-y:auto;
  animation:up .32s cubic-bezier(.34,1.56,.64,1);
}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:44px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.mimg-wrap{
  width:100%;border-radius:16px;overflow:hidden;background:var(--surface2);
  margin-bottom:20px;display:flex;align-items:center;justify-content:center;
  min-height:200px;max-height:260px;
}
.mimg-wrap img{width:100%;max-height:260px;object-fit:contain}
.mimg-wrap .no-img-lg{font-size:80px;padding:20px}
.mbrand{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px}
.mname{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:16px;line-height:1.15}
.mspecs{background:var(--surface2);border-radius:12px;overflow:hidden;margin-bottom:16px}
.mspec-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px}
.mspec-row:last-child{border:none}
.mspec-key{color:var(--text2)}
.mspec-val{font-weight:600;text-align:right;max-width:60%}
.mprice{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:var(--green);margin-bottom:4px}
.mprice-alt{font-size:13px;color:var(--text2);margin-bottom:24px}
.btn-wa-m{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:17px;
  background:linear-gradient(135deg,#25D366,#128c3e);
  color:#fff;border:none;border-radius:16px;
  font-family:'Syne',sans-serif;font-size:16px;font-weight:700;
  cursor:pointer;margin-bottom:10px;letter-spacing:.2px;
  box-shadow:0 8px 24px rgba(37,211,102,.3);
  transition:transform .15s,box-shadow .15s;
}
.btn-wa-m:active{transform:scale(.97);box-shadow:none}
.btn-close{
  width:100%;padding:14px;background:transparent;color:var(--text2);
  border:1.5px solid var(--border);border-radius:14px;
  font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:border-color .15s;
}
.btn-close:hover{border-color:var(--text2)}

/* ── FOOTER ── */
footer{
  text-align:center;padding:28px 20px;color:var(--text3);font-size:12px;
  border-top:1px solid var(--border);line-height:1.8;
}
footer a{color:var(--accent);text-decoration:none;font-weight:600}
</style>
</head>

      <div class="hstat-label">Marcas</div>
    </div>
  </div>
</section>

<div class="filters-wrap">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Buscar marca, modelo..." oninput="applyFilters()">
  </div>
  <div class="chips" id="brand-chips">
    <div class="chip active" data-brand="" onclick="selectBrand(this)">✦ Todos</div>
  </div>
  <div class="selects-row">
    <select class="sel" id="currency-filter" onchange="applyFilters()">
      <option value="all">Todas las monedas</option>
      <option value="C$">C$ Córdobas</option>
      <option value="US$">US$ Dólares</option>
    </select>
    <select class="sel" id="price-sort" onchange="applyFilters()">
      <option value="">Sin ordenar</option>
      <option value="asc">💰 Menor precio</option>
      <option value="desc">💎 Mayor precio</option>
    </select>
  </div>
</div>

<div id="loading" class="loader"><div class="spin"></div><span>Cargando catálogo...</span></div>
<div id="grid" style="display:none"></div>
<div id="empty" class="empty-state" style="display:none">
  <div class="icon">🔍</div>
  <p>No encontramos equipos<br>con esos filtros</p>
</div>

<footer>
  <strong style="color:var(--text)">Titi Cell</strong> · Nicaragua<br>
  ¿Dudas? <a href="https://wa.me/50584569686">Escríbenos por WhatsApp</a>
</footer>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="mhandle"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const SUPA_URL = 'https://sqkflifdnfgeufawepfp.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxa2ZsaWZkbmZnZXVmYXdlcGZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4Njc2NzYsImV4cCI6MjA5NjQ0MzY3Nn0.d7jSOkVaN00wxzBTAfGAC_CXEPkQH4h8GHi0uk9njZ8';
const WA_NUM   = '50584569686';
const RATE     = 37;

let all = [], activeBrand = '';

async function load() {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/products?select=*&status=eq.disponible&order=brand.asc,model.asc`,
      {headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
    all = (await r.json()).filter(p=>p.status==='disponible');
    buildChips();
    applyFilters();
  } catch(e) {
    document.getElementById('loading').innerHTML='<div class="icon">⚠️</div><p>No se pudo cargar el catálogo.<br>Intenta de nuevo.</p>';
    document.getElementById('loading').className='empty-state';
  }
}

function buildChips() {
  const brands = [...new Set(all.map(p=>p.brand).filter(Boolean))].sort();
  document.getElementById('count-brands').textContent = brands.length;
  const row = document.getElementById('brand-chips');
  row.innerHTML = '<div class="chip active" data-brand="" onclick="selectBrand(this)">✦ Todos</div>' +
    brands.map(b=>`<div class="chip" data-brand="${b}" onclick="selectBrand(this)">${b}</div>`).join('');
}

function selectBrand(el) {
  document.querySelectorAll('#brand-chips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  activeBrand = el.dataset.brand;
  applyFilters();
}

function applyFilters() {
  const q   = document.getElementById('search').value.toLowerCase();
  const cur = document.getElementById('currency-filter').value;
  const srt = document.getElementById('price-sort').value;
  let list  = all.filter(p=>{
    const ms = !activeBrand||p.brand===activeBrand;
    const mq = !q||(p.brand+' '+p.model+(p.storage||'')+(p.color||'')).toLowerCase().includes(q);
    const mc = cur==='all'||p.currency===cur;
    return ms&&mq&&mc;
  });
  if(srt==='asc')  list.sort((a,b)=>toUSD(a.price,a.currency)-toUSD(b.price,b.currency));
  if(srt==='desc') list.sort((a,b)=>toUSD(b.price,b.currency)-toUSD(a.price,a.currency));
  document.getElementById('loading').style.display='none';
  document.getElementById('count-total').textContent = all.length;
  document.getElementById('header-count').textContent = list.length+' equipos';
  const grid=document.getElementById('grid'), empty=document.getElementById('empty');
  if(!list.length){grid.style.display='none';empty.style.display='block';return;}
  empty.style.display='none'; grid.style.display='grid';
  grid.innerHTML=list.map(card).join('');
}

const toUSD=(v,c)=>c==='US$'?v:v/RATE;
const fmt=(v,c)=>c+' '+parseFloat(v||0).toLocaleString('es-NI',{minimumFractionDigits:2,maximumFractionDigits:2});
const alt=(p)=>p.currency==='US$'?'C$ '+(p.price*RATE).toLocaleString('es-NI',{minimumFractionDigits:0,maximumFractionDigits:0}):'US$ '+toUSD(p.price,'C$').toLocaleString('es-NI',{minimumFractionDigits:2,maximumFractionDigits:2});

function card(p) {
  const specs=[p.storage,p.color].filter(Boolean).join(' · ');
  const img=p.image_url
    ?`<img src="${p.image_url}" alt="${p.brand} ${p.model}" loading="lazy">`
    :`<div class="no-img"><span>📱</span><small>${p.brand}</small></div>`;
  return `<div class="pcard" onclick="openDetail('${p.id}')">
    <div class="pcard-img">${img}</div>
    <div class="pcard-body">
      <div class="pcard-brand">${p.brand}</div>
      <div class="pcard-name">${p.model}</div>
      <div class="pcard-specs">${specs||'&nbsp;'}</div>
      <div class="pcard-price">${fmt(p.price,p.currency)}</div>
      <div class="pcard-alt">${alt(p)}</div>
    </div>
    <button class="pcard-wa" onclick="event.stopPropagation();sendWA('${p.id}')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.126.557 4.126 1.527 5.858L.057 23.203a.75.75 0 0 0 .923.923l5.345-1.47A11.955 11.955 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.891 0-3.667-.502-5.2-1.378l-.374-.217-3.871 1.065 1.065-3.871-.217-.374A9.955 9.955 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
      Me interesa
    </button>
  </div>`;
}

function openDetail(id) {
  const p=all.find(x=>x.id===id); if(!p) return;
  const specs=[p.storage,p.color].filter(Boolean);
  document.getElementById('modal-body').innerHTML=`
    <div class="mimg-wrap">
      ${p.image_url?`<img src="${p.image_url}" alt="${p.brand} ${p.model}">`:'<div class="no-img-lg">📱</div>'}
    </div>
    <div class="mbrand">${p.brand}</div>
    <div class="mname">${p.model}</div>
    ${specs.length||p.notes?`<div class="mspecs">
      ${p.storage?`<div class="mspec-row"><span class="mspec-key">Almacenamiento</span><span class="mspec-val">${p.storage}</span></div>`:''}
      ${p.color?`<div class="mspec-row"><span class="mspec-key">Color</span><span class="mspec-val">${p.color}</span></div>`:''}
      ${p.notes?`<div class="mspec-row"><span class="mspec-key">Notas</span><span class="mspec-val">${p.notes}</span></div>`:''}
    </div>`:''}
    <div class="mprice">${fmt(p.price,p.currency)}</div>
    <div class="mprice-alt">También: ${alt(p)}</div>
    <button class="btn-wa-m" onclick="sendWA('${p.id}')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.126.557 4.126 1.527 5.858L.057 23.203a.75.75 0 0 0 .923.923l5.345-1.47A11.955 11.955 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.891 0-3.667-.502-5.2-1.378l-.374-.217-3.871 1.065 1.065-3.871-.217-.374A9.955 9.955 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
      Me interesa — Escribir por WhatsApp
    </button>
    <button class="btn-close" onclick="closeModal()">Cerrar</button>
  `;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}

load();
</script>
</body>
</html>
