<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d18">
<title>Titi Cell &#8212; Cat&#225;logo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d18;--sf:#13131f;--sf2:#1c1c2e;--bd:#2e2e4a;--ac:#7c6fff;--ag:rgba(124,111,255,0.3);--gr:#3ddc84;--tx:#eeeeff;--tx2:#9090bb;--tx3:#5a5a80;--r:18px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:"DM Sans",sans-serif;min-height:100vh;overflow-x:hidden}
header{position:sticky;top:0;z-index:100;background:rgba(13,13,24,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--bd);padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.hlogo{display:flex;align-items:center;gap:10px}
.hlogo img{height:38px;width:auto;filter:drop-shadow(0 0 10px var(--ag))}
.hlogo-name{font-family:"Syne",sans-serif;font-size:19px;font-weight:800}
.hlogo-name span{color:var(--ac)}
.hbadge{background:rgba(124,111,255,0.12);border:1px solid rgba(124,111,255,0.25);color:var(--ac);padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600}
.hero{position:relative;overflow:hidden;padding:52px 20px 44px;text-align:center;background:linear-gradient(160deg,rgba(124,111,255,0.1) 0%,rgba(61,220,132,0.04) 60%,transparent 100%)}
.hero::before{content:"";position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(124,111,255,0.12) 0%,transparent 70%);pointer-events:none}
.eyebrow{display:inline-block;background:rgba(124,111,255,0.12);border:1px solid rgba(124,111,255,0.25);color:var(--ac);padding:5px 16px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px}
.hero h1{font-family:"Syne",sans-serif;font-size:clamp(26px,6vw,40px);font-weight:800;line-height:1.1;letter-spacing:-1px;margin-bottom:12px}
.hero h1 span{background:linear-gradient(135deg,var(--ac),var(--gr));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:14px;color:var(--tx2);max-width:320px;margin:0 auto 24px;line-height:1.6}
.hstats{display:flex;justify-content:center;gap:24px}
.hstat-num{font-family:"Syne",sans-serif;font-size:22px;font-weight:800;color:var(--ac)}
.hstat-lbl{font-size:11px;color:var(--tx2);margin-top:2px}
.fw{padding:16px 20px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:12px}
.sw{display:flex;align-items:center;gap:10px;background:var(--sf2);border:1.5px solid var(--bd);border-radius:14px;padding:11px 16px;transition:border-color .2s}
.sw:focus-within{border-color:var(--ac)}
.sw input{flex:1;background:none;border:none;color:var(--tx);font-family:"DM Sans",sans-serif;font-size:15px;outline:none}
.sw input::placeholder{color:var(--tx3)}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:7px 16px;border-radius:24px;font-size:12px;font-weight:600;border:1.5px solid var(--bd);background:var(--sf2);color:var(--tx2);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.chip.active{background:var(--ac);border-color:var(--ac);color:#fff;box-shadow:0 4px 16px var(--ag)}
.srow{display:flex;gap:8px}
.sel{flex:1;padding:10px 12px;background:var(--sf2);border:1.5px solid var(--bd);border-radius:12px;color:var(--tx);font-family:"DM Sans",sans-serif;font-size:13px;outline:none;-webkit-appearance:none;cursor:pointer}
.sel:focus{border-color:var(--ac)}
#grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:20px}
@media(min-width:560px){#grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:860px){#grid{grid-template-columns:repeat(4,1fr)}}
.pc{background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);overflow:hidden;cursor:pointer;display:flex;flex-direction:column;transition:transform .18s,border-color .18s,box-shadow .18s}
.pc:hover{transform:translateY(-3px);border-color:rgba(124,111,255,.4);box-shadow:0 12px 32px rgba(0,0,0,.4)}
.pc:active{transform:scale(.97)}
.pc-img{width:100%;aspect-ratio:1;background:var(--sf2);display:flex;align-items:center;justify-content:center;overflow:hidden}
.pc-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.pc:hover .pc-img img{transform:scale(1.04)}
.no-img{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--tx3);font-size:12px}
.no-img-e{font-size:40px}
.pc-body{padding:12px 12px 8px;flex:1;display:flex;flex-direction:column}
.pc-brand{font-size:10px;color:var(--ac);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.pc-name{font-family:"Syne",sans-serif;font-size:14px;font-weight:700;line-height:1.2;margin-bottom:5px}
.pc-specs{font-size:11px;color:var(--tx2);margin-bottom:10px;flex:1;line-height:1.4}
.pc-price{font-family:"Syne",sans-serif;font-size:17px;font-weight:800;color:var(--gr);margin-bottom:2px}
.pc-alt{font-size:10px;color:var(--tx3)}
.pc-wa{display:flex;align-items:center;justify-content:center;gap:7px;background:linear-gradient(135deg,#25D366,#1da851);color:#fff;border:none;border-radius:0 0 calc(var(--r) - 2px) calc(var(--r) - 2px);padding:11px;font-family:"Syne",sans-serif;font-size:12px;font-weight:700;cursor:pointer;width:100%;margin-top:10px}
.pc-wa:active{opacity:.85}
.empty{text-align:center;padding:70px 20px;color:var(--tx2)}
.empty .ei{font-size:54px;margin-bottom:14px}
.loader{display:flex;flex-direction:column;align-items:center;padding:70px 20px;gap:14px;color:var(--tx2)}
.spin{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-end}
.ov.open{display:flex}
.modal{background:var(--sf);border-radius:28px 28px 0 0;border-top:1.5px solid var(--bd);padding:20px 20px calc(env(safe-area-inset-bottom,0px) + 24px);width:100%;max-height:92vh;overflow-y:auto;animation:up .32s cubic-bezier(.34,1.56,.64,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:44px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 20px}
.mimg{width:100%;border-radius:16px;overflow:hidden;background:var(--sf2);margin-bottom:20px;display:flex;align-items:center;justify-content:center;min-height:200px;max-height:260px}
.mimg img{width:100%;max-height:260px;object-fit:contain}
.no-img-lg{font-size:80px;padding:20px}
.mbrand{font-size:11px;color:var(--ac);font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px}
.mname{font-family:"Syne",sans-serif;font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:16px;line-height:1.15}
.mspecs{background:var(--sf2);border-radius:12px;overflow:hidden;margin-bottom:16px}
.msr{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--bd);font-size:13px}
.msr:last-child{border:none}
.msk{color:var(--tx2)}
.msv{font-weight:600;text-align:right;max-width:60%}
.mprice{font-family:"Syne",sans-serif;font-size:30px;font-weight:800;color:var(--gr);margin-bottom:4px}
.malt{font-size:13px;color:var(--tx2);margin-bottom:24px}
.bwa{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:17px;background:linear-gradient(135deg,#25D366,#128c3e);color:#fff;border:none;border-radius:16px;font-family:"Syne",sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;box-shadow:0 8px 24px rgba(37,211,102,.3);transition:transform .15s}
.bwa:active{transform:scale(.97)}
.bclose{width:100%;padding:14px;background:transparent;color:var(--tx2);border:1.5px solid var(--bd);border-radius:14px;font-family:"DM Sans",sans-serif;font-size:14px;cursor:pointer}
footer{text-align:center;padding:28px 20px;color:var(--tx3);font-size:12px;border-top:1px solid var(--bd);line-height:1.8}
footer a{color:var(--ac);text-decoration:none;font-weight:600}
</style>
</head>
<body>
<header>
  <div class="hlogo">
    <img src="data:image/png;base64," alt="Titi Cell">
    <div class="hlogo-name">Titi <span>Cell</span></div>
  </div>
  <div class="hbadge" id="hcount">Cargando...</div>
</header>
<section class="hero">
  <div class="eyebrow">&#128241; Cat&aacute;logo Oficial</div>
  <h1>Encuentra tu<br><span>celular ideal</span></h1>
  <p>Equipos de calidad al mejor precio. Todos disponibles para entrega inmediata.</p>
  <div class="hstats">
    <div><div class="hstat-num" id="cnt-t">&mdash;</div><div class="hstat-lbl">Equipos</div></div>
    <div><div class="hstat-num" id="cnt-b">&mdash;</div><div class="hstat-lbl">Marcas</div></div>
  </div>
</section>
<div class="fw">
  <div class="sw">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="q" placeholder="Buscar marca, modelo..." oninput="render()">
  </div>
  <div class="chips" id="chips"></div>
  <div class="srow">
    <select class="sel" id="cat" onchange="render()"><option value="all">Todas las categor&iacute;as</option><option value="Celular">Celular</option><option value="Cargador">Cargador</option><option value="Auriculares">Auriculares</option><option value="Cable">Cable</option><option value="Funda">Funda</option><option value="Vidrio Templado">Vidrio Templado</option><option value="Accesorio">Accesorio</option><option value="Otro">Otro</option></select>
    <select class="sel" id="cur" onchange="render()"><option value="all">Todas las monedas</option><option value="C$">C$ C&oacute;rdobas</option><option value="US$">US$ D&oacute;lares</option></select>
  </div>
  <div class="srow">
    <select class="sel" id="srt" onchange="render()"><option value="">Sin ordenar</option><option value="asc">Menor precio</option><option value="desc">Mayor precio</option></select>
  </div>
</div>
<div id="loading" class="loader"><div class="spin"></div><span>Cargando cat&aacute;logo...</span></div>
<div id="grid" style="display:none"></div>
<div id="empty" class="empty" style="display:none"><div class="ei">&#128269;</div><p>No encontramos equipos con esos filtros</p></div>
<footer><strong style="color:var(--tx)">Titi Cell</strong> &middot; Nicaragua<br><a href="https://wa.me/50584569686">Esc&iacute;benos por WhatsApp</a></footer>
<div class="ov" id="ov"><div class="modal"><div class="mh"></div><div id="mb"></div></div></div>
<script>
var SU = "https://sqkflifdnfgeufawepfp.supabase.co";
var SK = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxa2ZsaWZkbmZnZXVmYXdlcGZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4Njc2NzYsImV4cCI6MjA5NjQ0MzY3Nn0.d7jSOkVaN00wxzBTAfGAC_CXEPkQH4h8GHi0uk9njZ8";
var WN = "50584569686";
var RT = 37, all = [], ab = "";

function nio(p) {
  var v = p.currency === "C$" ? p.price : p.price * RT;
  return "C$ " + v.toLocaleString("es-NI", {minimumFractionDigits:2, maximumFractionDigits:2});
}
function usd(p) {
  var v = p.currency === "US$" ? p.price : p.price / RT;
  return "US$ " + v.toLocaleString("es-NI", {minimumFractionDigits:2, maximumFractionDigits:2});
}
function tusd(v,c) { return c === "US$" ? v : v / RT; }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

async function loadCatalog() {
  try {
    var r = await fetch(SU + "/rest/v1/products?select=*&status=eq.disponible&order=brand.asc,model.asc", {
      headers: {"apikey": SK, "Authorization": "Bearer " + SK}
    });
    var d = await r.json();
    all = d.filter(function(p) { return p.status === "disponible"; });
    buildChips();
    render();
  } catch(e) {
    document.getElementById("loading").innerHTML = "<p>No se pudo cargar el catalogo.</p>";
    document.getElementById("loading").className = "empty";
  }
}

function buildChips() {
  var brands = [];
  all.forEach(function(p) { if (p.brand && brands.indexOf(p.brand) === -1) brands.push(p.brand); });
  brands.sort();
  document.getElementById("cnt-b").textContent = brands.length;
  var h = "<div class='chip active' data-b='' onclick='selB(this)'>&#10038; Todos</div>";
  brands.forEach(function(b) { h += "<div class='chip' data-b='" + esc(b) + "' onclick='selB(this)'>" + esc(b) + "</div>"; });
  document.getElementById("chips").innerHTML = h;
}

function selB(el) {
  document.querySelectorAll(".chips .chip").forEach(function(c) { c.classList.remove("active"); });
  el.classList.add("active");
  ab = el.getAttribute("data-b");
  render();
}

function render() {
  var q   = document.getElementById("q").value.toLowerCase();
  var cur = document.getElementById("cur").value;
  var srt = document.getElementById("srt").value;
  var catF = document.getElementById("cat").value;
  var list = all.filter(function(p) {
    var ms  = !ab   || p.brand === ab;
    var mq  = !q    || (p.brand + " " + p.model + " " + (p.storage||"") + " " + (p.color||"") + " " + (p.category||"")).toLowerCase().indexOf(q) !== -1;
    var mc  = cur === "all" || p.currency === cur;
    var mca = catF === "all" || (p.category||"Celular") === catF;
    return ms && mq && mc && mca;
  });
  if (srt === "asc")  list.sort(function(a,b) { return tusd(a.price,a.currency) - tusd(b.price,b.currency); });
  if (srt === "desc") list.sort(function(a,b) { return tusd(b.price,b.currency) - tusd(a.price,a.currency); });
  document.getElementById("loading").style.display = "none";
  document.getElementById("cnt-t").textContent = all.length;
  document.getElementById("hcount").textContent = list.length + " equipos";
  var g = document.getElementById("grid"), e = document.getElementById("empty");
  if (!list.length) { g.style.display="none"; e.style.display="block"; return; }
  e.style.display = "none"; g.style.display = "grid";
  var h = ""; list.forEach(function(p) { h += mkCard(p); }); g.innerHTML = h;
  g.querySelectorAll(".pc").forEach(function(el) {
    el.addEventListener("click", function() { openD(this.getAttribute("data-id")); });
  });
  g.querySelectorAll(".pc-wa").forEach(function(el) {
    el.addEventListener("click", function(ev) { ev.stopPropagation(); sendWA(this.getAttribute("data-id")); });
  });
}

function mkCard(p) {
  var sp = [p.storage, p.color].filter(Boolean).join(" &#183; ");
  var img = p.image_url
    ? "<img src='" + esc(p.image_url) + "' loading='lazy'>"
    : "<div class='no-img'><div class='no-img-e'>&#128241;</div><small>" + esc(p.brand) + "</small></div>";
  return "<div class='pc' data-id='" + esc(p.id) + "'>"
    + "<div class='pc-img'>" + img + "</div>"
    + "<div class='pc-body'>"
    + "<div class='pc-brand'>" + esc(p.brand) + "</div>"
    + "<div class='pc-name'>"  + esc(p.model)  + "</div>"
    + "<div class='pc-specs'>" + (esc(sp)||"&nbsp;") + "</div>"
    + "<div style='font-size:10px;color:var(--tx3);margin-bottom:4px'>" + esc(p.category||"Celular") + "</div>"
    + "<div class='pc-price'>" + nio(p) + "</div>"
    + "<div class='pc-alt'>"   + usd(p) + "</div>"
    + "</div>"
    + "<button class='pc-wa' data-id='" + esc(p.id) + "'>&#128172; Me interesa</button>"
    + "</div>";
}

function openD(id) {
  var p = null;
  for (var i = 0; i < all.length; i++) { if (all[i].id === id) { p = all[i]; break; } }
  if (!p) return;
  var imgH = p.image_url
    ? "<img src='" + esc(p.image_url) + "' alt='" + esc(p.brand) + " " + esc(p.model) + "'>"
    : "<div class='no-img-lg'>&#128241;</div>";
  var sp = "";
  sp = "<div class='mspecs'>";
  sp += "<div class='msr'><span class='msk'>Categor&iacute;a</span><span class='msv'>" + esc(p.category||"Celular") + "</span></div>";
  if (p.storage) sp += "<div class='msr'><span class='msk'>Almacenamiento</span><span class='msv'>" + esc(p.storage) + "</span></div>";
  if (p.color)   sp += "<div class='msr'><span class='msk'>Color</span><span class='msv'>"         + esc(p.color)   + "</span></div>";
  if (p.notes)   sp += "<div class='msr'><span class='msk'>Notas</span><span class='msv'>"         + esc(p.notes)   + "</span></div>";
  sp += "</div>";
  var mb = document.getElementById("mb");
  mb.innerHTML = "<div class='mimg'>" + imgH + "</div>"
    + "<div class='mbrand'>" + esc(p.brand) + "</div>"
    + "<div class='mname'>"  + esc(p.model)  + "</div>"
    + sp
    + "<div class='mprice'>" + nio(p) + "</div>"
    + "<div class='malt'>"   + usd(p) + "</div>"
    + "<button class='bwa' id='bbwa'>&#128172; Me interesa &mdash; WhatsApp</button>"
    + "<button class='bclose' onclick='closeModal()'>Cerrar</button>";
  document.getElementById("bbwa").addEventListener("click", function() { sendWA(p.id); });
  document.getElementById("ov").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("ov").classList.remove("open");
  document.body.style.overflow = "";
}
document.getElementById("ov").addEventListener("click", function(e) { if (e.target === this) closeModal(); });

function sendWA(id) {
  var p = null;
  for (var i = 0; i < all.length; i++) { if (all[i].id === id) { p = all[i]; break; } }
  if (!p) return;
  var sp = [p.storage, p.color].filter(Boolean).join(", ");
  var msg = "Hola! Vi el catalogo de Titi Cell y me interesa:\n\n"
    + "&#128241; " + p.brand + " " + p.model + (sp ? " (" + sp + ")" : "") + "\n"
    + "Precio: " + nio(p) + " (" + usd(p) + ")\n\n"
    + "Esta disponible?";
  window.open("https://wa.me/" + WN + "?text=" + encodeURIComponent(msg), "_blank");
}

loadCatalog();
</script>
</body>
</html>
