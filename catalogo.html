<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>Titi Cell — Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a26;
    --border:#2a2a3d; --accent:#6c63ff; --accent2:#ff6584;
    --accent3:#43e97b; --accent4:#f7971e; --text:#f0f0f8; --text2:#8888aa;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100%}

  /* HEADER */
  header{
    background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:100;padding:12px 16px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
  }
  .logo{display:flex;align-items:center;gap:10px}
  .logo img{height:40px;width:auto;filter:drop-shadow(0 0 8px rgba(108,99,255,0.4))}
  .logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800}
  .logo-text span{color:var(--accent)}
  .header-right{font-size:11px;color:var(--text2);text-align:right;line-height:1.4}

  /* HERO */
  .hero{
    padding:32px 16px 20px;text-align:center;
    background:linear-gradient(180deg,rgba(108,99,255,0.08) 0%,transparent 100%);
  }
  .hero h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:6px}
  .hero p{font-size:13px;color:var(--text2)}
  #product-count{color:var(--accent);font-weight:600}

  /* FILTERS */
  .filters{padding:12px 16px;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid var(--border)}
  .search-box{
    display:flex;align-items:center;gap:10px;
    background:var(--surface2);border:1px solid var(--border);
    border-radius:12px;padding:10px 14px;
  }
  .search-box input{flex:1;background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none}
  .search-box input::placeholder{color:var(--text2)}
  .filter-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}
  .filter-row::-webkit-scrollbar{display:none}
  .chip{
    padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;
    border:1px solid var(--border);background:var(--surface2);color:var(--text2);
    cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;
  }
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .price-range{display:flex;gap:8px;align-items:center}
  .price-range select{
    flex:1;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);
    border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;
    outline:none;-webkit-appearance:none;
  }
  .price-range label{font-size:12px;color:var(--text2);white-space:nowrap}

  /* GRID */
  #grid{
    display:grid;grid-template-columns:repeat(2,1fr);
    gap:12px;padding:16px;
  }
  @media(min-width:600px){#grid{grid-template-columns:repeat(3,1fr)}}
  @media(min-width:900px){#grid{grid-template-columns:repeat(4,1fr)}}

  /* CARD */
  .product-card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:16px;overflow:hidden;cursor:pointer;
    transition:transform 0.15s,border-color 0.15s;
    display:flex;flex-direction:column;
  }
  .product-card:active{transform:scale(0.97)}
  .card-img{
    width:100%;aspect-ratio:1;background:var(--surface2);
    display:flex;align-items:center;justify-content:center;
    font-size:48px;overflow:hidden;
  }
  .card-img img{width:100%;height:100%;object-fit:cover}
  .card-body{padding:10px;flex:1;display:flex;flex-direction:column}
  .card-brand{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px}
  .card-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;line-height:1.2;margin-bottom:4px}
  .card-specs{font-size:11px;color:var(--text2);margin-bottom:8px;flex:1}
  .card-price{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--accent3)}
  .card-price-alt{font-size:11px;color:var(--text2)}
  .card-wa{
    display:flex;align-items:center;justify-content:center;gap:6px;
    background:#25D366;color:#fff;border:none;border-radius:0 0 14px 14px;
    padding:10px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
    cursor:pointer;width:100%;transition:background 0.15s;margin-top:8px;
  }
  .card-wa:active{background:#1da851}

  /* EMPTY */
  .empty{text-align:center;padding:60px 20px;color:var(--text2)}
  .empty-icon{font-size:48px;margin-bottom:12px}

  /* MODAL */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);
    z-index:200;display:none;align-items:flex-end;
  }
  .modal-overlay.open{display:flex}
  .modal{
    background:var(--surface);border-radius:24px 24px 0 0;
    padding:20px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px);
    width:100%;max-height:90vh;overflow-y:auto;
    animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
  .modal-img{width:100%;max-height:260px;object-fit:contain;border-radius:12px;background:var(--surface2);margin-bottom:16px}
  .modal-brand{font-size:11px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
  .modal-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:12px}
  .spec-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
  .spec-row:last-of-type{border:none}
  .spec-key{color:var(--text2)}
  .spec-val{font-weight:600}
  .modal-price{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--accent3);margin:16px 0 4px}
  .modal-price-alt{font-size:13px;color:var(--text2);margin-bottom:20px}
  .btn-wa-modal{
    display:flex;align-items:center;justify-content:center;gap:10px;
    width:100%;padding:16px;background:#25D366;color:#fff;border:none;
    border-radius:14px;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;
    cursor:pointer;margin-bottom:10px;
  }
  .btn-close{
    width:100%;padding:13px;background:transparent;color:var(--text2);
    border:1px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;
    font-size:14px;cursor:pointer;
  }

  /* LOADING */
  #loading{text-align:center;padding:60px 20px;color:var(--text2)}
  .spinner{
    width:32px;height:32px;border:3px solid var(--border);
    border-top-color:var(--accent);border-radius:50%;
    animation:spin 0.8s linear infinite;margin:0 auto 12px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  footer{
    text-align:center;padding:24px 16px;color:var(--text2);font-size:12px;
    border-top:1px solid var(--border);margin-top:8px;
  }
</style>
</head>

<div class="hero">
  <h1>Catálogo de Celulares</h1>
  <p>Todos nuestros equipos disponibles · <span id="product-count">...</span> equipos</p>
</div>

<div class="filters">
  <div class="search-box">
    <span>🔍</span>
    <input type="text" id="search" placeholder="Buscar marca o modelo..." oninput="applyFilters()">
  </div>
  <div class="filter-row" id="brand-chips">
    <div class="chip active" data-brand="" onclick="selectBrand(this)">Todas</div>
  </div>
  <div class="price-range">
    <label>Precio:</label>
    <select id="currency-filter" onchange="applyFilters()">
      <option value="all">Todas las monedas</option>
      <option value="C$">C$ Córdobas</option>
      <option value="US$">US$ Dólares</option>
    </select>
    <select id="price-sort" onchange="applyFilters()">
      <option value="">Sin ordenar</option>
      <option value="asc">Menor precio</option>
      <option value="desc">Mayor precio</option>
    </select>
  </div>
</div>

<div id="loading"><div class="spinner"></div>Cargando catálogo...</div>
<div id="grid" style="display:none"></div>
<div id="empty" class="empty" style="display:none"><div class="empty-icon">📱</div><p>No hay equipos con esos filtros</p></div>

<footer>Titi Cell · Nicaragua · <a href="https://wa.me/50584569686" style="color:var(--accent);text-decoration:none">Contáctanos por WhatsApp</a></footer>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const SUPA_URL = 'https://sqkflifdnfgeufawepfp.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxa2ZsaWZkbmZnZXVmYXdlcGZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4Njc2NzYsImV4cCI6MjA5NjQ0MzY3Nn0.d7jSOkVaN00wxzBTAfGAC_CXEPkQH4h8GHi0uk9njZ8';
const WA_NUM   = '50584569686';
const RATE     = 37; // fallback exchange rate

let allProducts = [];
let activeBrand = '';

async function loadProducts() {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/products?select=*&status=eq.disponible&order=brand.asc,model.asc`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
    });
    allProducts = (await r.json()).filter(p => p.status === 'disponible');
    buildBrandChips();
    applyFilters();
  } catch(e) {
    document.getElementById('loading').innerHTML = '<div class="empty-icon">⚠️</div><p>No se pudo cargar el catálogo</p>';
  }
}

function buildBrandChips() {
  const brands = [...new Set(allProducts.map(p => p.brand).filter(Boolean))].sort();
  const row = document.getElementById('brand-chips');
  row.innerHTML = '<div class="chip active" data-brand="" onclick="selectBrand(this)">Todas</div>' +
    brands.map(b => `<div class="chip" data-brand="${b}" onclick="selectBrand(this)">${b}</div>`).join('');
}

function selectBrand(el) {
  document.querySelectorAll('#brand-chips .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeBrand = el.dataset.brand;
  applyFilters();
}

function applyFilters() {
  const q    = document.getElementById('search').value.toLowerCase();
  const cur  = document.getElementById('currency-filter').value;
  const sort = document.getElementById('price-sort').value;

  let list = allProducts.filter(p => {
    const matchBrand  = !activeBrand || p.brand === activeBrand;
    const matchSearch = !q || (p.brand+' '+p.model+(p.storage||'')+(p.color||'')).toLowerCase().includes(q);
    const matchCur    = cur === 'all' || p.currency === cur;
    return matchBrand && matchSearch && matchCur;
  });

  if (sort === 'asc')  list.sort((a,b) => toUSD(a.price,a.currency) - toUSD(b.price,b.currency));
  if (sort === 'desc') list.sort((a,b) => toUSD(b.price,b.currency) - toUSD(a.price,a.currency));

  const count = list.length;
  document.getElementById('product-count').textContent = count;
  document.getElementById('product-count-h').textContent = count;
  document.getElementById('loading').style.display = 'none';

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if (!count) { grid.style.display='none'; empty.style.display='block'; return; }
  empty.style.display = 'none';
  grid.style.display  = 'grid';
  grid.innerHTML = list.map(p => productCard(p)).join('');
}

function toUSD(v,c) { return c==='US$'?v:v/RATE; }
function fmt(v,c) { return c+' '+parseFloat(v||0).toLocaleString('es-NI',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function altPrice(p) {
  if (p.currency==='US$') return 'C$ '+((p.price*RATE).toLocaleString('es-NI',{minimumFractionDigits:0}));
  return 'US$ '+toUSD(p.price,'C$').toLocaleString('es-NI',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function productCard(p) {
  const specs = [p.storage, p.color].filter(Boolean).join(' · ');
  const img   = p.image_url
    ? `<img src="${p.image_url}" alt="${p.brand} ${p.model}" loading="lazy">`
    : '📱';
  return `<div class="product-card" onclick="openDetail('${p.id}')">
    <div class="card-img">${img}</div>
    <div class="card-body">
      <div class="card-brand">${p.brand}</div>
      <div class="card-name">${p.model}</div>
      <div class="card-specs">${specs||'&nbsp;'}</div>
      <div class="card-price">${fmt(p.price,p.currency)}</div>
      <div class="card-price-alt">${altPrice(p)}</div>
    </div>
    <button class="card-wa" onclick="event.stopPropagation();sendWA('${p.id}')">
      💬 Me interesa
    </button>
  </div>`;
}

function openDetail(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  const specs = [p.storage, p.color].filter(Boolean).join(' · ');
  document.getElementById('modal-body').innerHTML = `
    ${p.image_url ? `<img class="modal-img" src="${p.image_url}" alt="${p.brand} ${p.model}">` : '<div style="text-align:center;font-size:80px;margin-bottom:16px">📱</div>'}
    <div class="modal-brand">${p.brand}</div>
    <div class="modal-name">${p.model}</div>
    ${specs?`<div class="spec-row"><span class="spec-key">Detalles</span><span class="spec-val">${specs}</span></div>`:''}
    ${p.notes?`<div class="spec-row"><span class="spec-key">Notas</span><span class="spec-val">${p.notes}</span></div>`:''}
    <div class="modal-price">${fmt(p.price,p.currency)}</div>
    <div class="modal-price-alt">También: ${altPrice(p)}</div>
    <button class="btn-wa-modal" onclick="sendWA('${p.id}')">💬 Me interesa — Escribir por WhatsApp</button>
    <button class="btn-close" onclick="closeModal()">Cerrar</button>
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function sendWA(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  const specs = [p.storage, p.color].filter(Boolean).join(', ');
  const msg = `Hola! Vi el catálogo de Titi Cell y me interesa:\n\n📱 *${p.brand} ${p.model}*${specs?' ('+specs+')':''}\n💰 Precio: *${fmt(p.price,p.currency)}*\n\n¿Está disponible? 😊`;
  window.open(`https://wa.me/${WA_NUM}?text=${encodeURIComponent(msg)}`, '_blank');
}

loadProducts();
